<html>
    <head>
        <style>
            div.first {
                opacity: 0.1;
            }
            div.second {
                opacity: 0.2;
            }
            div.third {
                opacity: 0.3;
            }

        </style>
    </head>
    <body>
        <h1>this is the opacity property</h1>
        <p>this is how the property looks</p>

        <div class="first">opacity 0.1</div>
        <div class="second">opacity 0.2</div>
        <div class="third">opacity 0.3</div>
        <div><p>opacity 1 (default)</p></div>
    </body>
</html>
