<html>
    <head>
        <style>
        div {
            right: 30px;
            border: 3px solid #73ad21;
        }
        div.absolute {
            position: absolute;
            left: 50px;
            border: 3px solid blue;
        }
        div.relative {
            position: relative;
            left: 100px;
            border: 3px solid red;
        }
        div.fixed {
            position: fixed;
            top: 0;
            right: 20px;
            width: 300px;
            border: 3px solid purple;
        }
        div.sticky {
            position: sticky;
            top: 1;
            left: 20;
            width: 100px;
            border: 3px solid brown;
        }
        </style>
    </head>
    <body>
        <h2>positioning</h2>

        <div> div with no postion property</div>
        <div>
        <div class="sticky">div with sticky position property</div></DIV>
       <div>
        <div class="relative">This div has the postion: relative;</div></div>
       <div>
        <div class="fixed">div with fixed position property</div> </div>
